<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Lab 3</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Мої завдання (<span id="envStatus"></span>)</h1>
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Додати нове завдання...">
            <select id="prioritySelect" name="priority">
                <option value="Low">Низький</option>
                <option value="Medium">Середній</option>
                <option value="High">Високий</option>
            </select>
            <button id="addTaskBtn">Додати</button>
        </div>
        <ul id="taskList">
            </ul>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
